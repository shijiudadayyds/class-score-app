<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面悬浮窗</title>
    <link rel="stylesheet" href="./widget.css" />
  </head>
  <body>
    <div id="widgetShell" class="widget-shell">
      <div class="widget-card">
        <button id="toggleMainButton" class="widget-button" type="button" title="显示或隐藏主窗口">
          <span class="widget-halo" aria-hidden="true"></span>
          <span class="widget-spark spark-left" aria-hidden="true"></span>
          <span class="widget-spark spark-right" aria-hidden="true"></span>
          <span class="widget-paw paw-left" aria-hidden="true"></span>
          <span class="widget-paw paw-right" aria-hidden="true"></span>
          <span class="widget-cat" aria-hidden="true">
            <span class="cat-shadow"></span>
            <span class="cat-tail"></span>
            <span class="cat-body">
              <span class="cat-belly"></span>
              <span class="cat-paw-leg cat-paw-back"></span>
              <span class="cat-paw-leg cat-paw-front"></span>
              <span class="cat-collar"></span>
              <span class="cat-bell"></span>
            </span>
            <span class="cat-head">
              <span class="cat-ear cat-ear-left"></span>
              <span class="cat-ear cat-ear-right"></span>
              <span class="cat-face">
                <span class="cat-eye cat-eye-left"></span>
                <span class="cat-eye cat-eye-right"></span>
                <span class="cat-eye-shine cat-eye-shine-left"></span>
                <span class="cat-eye-shine cat-eye-shine-right"></span>
                <span class="cat-blush cat-blush-left"></span>
                <span class="cat-blush cat-blush-right"></span>
                <span class="cat-muzzle"></span>
                <span class="cat-nose"></span>
                <span class="cat-mouth"></span>
                <span class="cat-whiskers cat-whiskers-left"></span>
                <span class="cat-whiskers cat-whiskers-right"></span>
              </span>
            </span>
          </span>
        </button>

        <button id="widgetExpandButton" class="widget-expand-toggle" type="button" data-no-drag="true" aria-expanded="false" title="展开悬浮工具">
          <span class="widget-expand-icon" aria-hidden="true"></span>
          <span id="widgetExpandText" class="widget-expand-text">展开工具</span>
        </button>

        <div id="widgetStatus" class="widget-status" aria-live="polite">
          <strong id="widgetBoardName" class="widget-board-name">班级面板</strong>
          <span id="widgetPrimaryText" class="widget-primary-text">待命</span>
          <span id="widgetSecondaryText" class="widget-secondary-text">0 人待命</span>
          <div class="widget-action-row">
            <button id="widgetRandomButton" class="widget-action-pill" type="button" data-widget-action="random-pick" data-no-drag="true" title="随机点名">点名</button>
            <button id="widgetStopwatchButton" class="widget-action-pill" type="button" data-widget-action="stopwatch-toggle" data-no-drag="true" title="开始或暂停计时器">计时</button>
            <button id="widgetCountdownButton" class="widget-action-pill" type="button" data-widget-action="countdown-toggle" data-no-drag="true" title="开始或暂停倒计时">倒计</button>
          </div>
        </div>

        <button id="widgetMenuButton" class="widget-menu" type="button" data-no-drag="true" title="更多操作" aria-label="更多操作">
          <span class="widget-yarn" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <script src="./widget.js"></script>
  </body>
</html>
